<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <!-- Left face: solid black, representing foundation and resilience -->
  <polygon points="15,42 60,68 60,115 15,89" fill="#0A0A0A" />
  <!-- Right face: outlined, indicating structure, framework, and transparency -->
  <polygon points="60,68 105,42 105,89 60,115" fill="none" stroke="#0A0A0A" stroke-width="6" stroke-linejoin="round"/>
  <!-- Top face: vibrant orange representing alert, digital energy, and focus -->
  <polygon points="60,15 105,42 60,68 15,42" fill="#FF6B00" />
</svg>
